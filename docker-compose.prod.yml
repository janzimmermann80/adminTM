services:
  api:
    image: ghcr.io/janzimmermann80/admintm-api:latest
    container_name: admintm-api
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      BANK_DB_PATH: /data/bank.db
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PRINT_BASE_URL: http://web/new/invoicing
      # Sdílený soubor vyřazených IČO se starým PHP adminem (reálný host soubor)
      DISABLED_CINS_FILE: /shared-others/disabled_cins.txt
    volumes:
      - admintm-data:/data
      # Namapování reálného hostitelského adresáře, kde je disabled_cins.txt (sdíleno s PHP)
      - /data/www/wwwroot/administration/others:/shared-others
    restart: unless-stopped

  web:
    image: ghcr.io/janzimmermann80/admintm-web:latest
    container_name: admintm-web
    depends_on:
      - api
    ports:
      - "127.0.0.1:8083:80"
    restart: unless-stopped

volumes:
  admintm-data:
