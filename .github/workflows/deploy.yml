name: Build and deploy TruckManager Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/janzimmermann80/admintm-api
  WEB_IMAGE: ghcr.io/janzimmermann80/admintm-web
  APP_DIR: /services/data/docker-apps/admin.truckmanager.eu

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest

    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy compose file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          set -e

          PORT="${DEPLOY_PORT:-22}"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $APP_DIR"
          scp -P "$PORT" docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/docker-compose.yml"

      - name: Pull and restart containers
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          APP_DIR: ${{ env.APP_DIR }}
        run: |
          set -e

          PORT="${DEPLOY_PORT:-22}"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd $APP_DIR
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
